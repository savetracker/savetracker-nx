name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: stable

jobs:
  check:
    name: Check, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --target x86_64-unknown-linux-gnu -- -D warnings

      - name: Test
        run: cargo test --target x86_64-unknown-linux-gnu

  build-switch:
    name: Build Switch NSP
    needs: [check]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly-2025-12-01
          . "$HOME/.cargo/env"
          rustup component add rust-src --toolchain nightly-2025-12-01

      - name: Install cargo-nx
        run: |
          . "$HOME/.cargo/env"
          cargo install cargo-nx --git https://github.com/aarch64-switch-rs/cargo-nx

      - name: Build NSP
        run: |
          . "$HOME/.cargo/env"
          export RUSTUP_TOOLCHAIN=nightly-2025-12-01
          cargo nx build --release -p savetracker-nx

      - name: Upload NSP artifact
        uses: actions/upload-artifact@v4
        with:
          name: savetracker-nx.nsp
          path: target/aarch64-nintendo-switch-freestanding/release/savetracker-nx.nsp

  release:
    name: GitHub Release
    needs: [check, build-switch]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download NSP artifact
        uses: actions/download-artifact@v4
        with:
          name: savetracker-nx.nsp

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: savetracker-nx.nsp
