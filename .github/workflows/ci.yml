name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Host tests (valgrind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make valgrind

      - name: Lint write call sites
        run: ./tools/lint_writes.sh

      - name: Build and run tests
        run: make -C tests test

      - name: Run tests under valgrind
        run: make -C tests valgrind

  build-switch:
    name: Build sysmodule NSP
    needs: [test]
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build debug
        run: |
          make OPTLEVEL="-O0"
          cp savetracker-nx.nsp savetracker-nx-debug.nsp

      - name: Build release
        run: |
          make clean
          make

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: savetracker-nx-release
          path: |
            savetracker-nx.zip
            savetracker-nx-debug.nsp
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [test, build-switch]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download release zip
        uses: actions/download-artifact@v4
        with:
          name: savetracker-nx-release

      - name: Extract NSP from zip
        run: unzip -j savetracker-nx.zip atmosphere/contents/*/exefs.nsp -d . && mv exefs.nsp savetracker-nx.nsp

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            savetracker-nx.zip
            savetracker-nx.nsp
            savetracker-nx-debug.nsp
